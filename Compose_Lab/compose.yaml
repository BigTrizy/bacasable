services:


  web:
    image: nginx
    container_name: web
    restart: unless-stopped
    ports:
      - "8080:80"


  database:
    image: postgres
    container_name: database
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: devops

    volumes:
      - postgres-data:/var/lib/postgresql

volumes:
  postgres-data:
